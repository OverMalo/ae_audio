<!doctype html>
<html lang="es">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3Z52E094P6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-3Z52E094P6');
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aeon`s End — VoicesFromOver</title>

    <meta name="theme-color" content="#0c0704" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Textos narrados de Aeon`s End" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  </head>
  <body>
    <!--
      Los textos en español de este HTML son solo el "arranque" (primer pintado /
      sin JS). La fuente de verdad de TODA la interfaz son los .json de i18n
      (src/i18n/<idioma>/ui.json); main.js los aplica en cuanto carga (applyStaticI18n)
      y al cambiar de idioma.
    -->
    <a class="skip-link" href="#main-content">Saltar al contenido</a>

    <div class="app">
      <div class="app-top">
        <header class="topbar">
          <div class="topbar-main-left">
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menú lateral" aria-controls="sidebar" aria-expanded="false">&#9776;</button>
            <span class="topbar-emblem" aria-hidden="true">
              <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
                <path d="M24 3 L41 12 V28 C41 38 33 43 24 45 C15 43 7 38 7 28 V12 Z" />
                <path d="M24 14 L30 24 L24 34 L18 24 Z" fill="currentColor" stroke="none" />
              </svg>
            </span>
          </div>
          <p class="topbar-brand" aria-hidden="true"><span class="beta-badge">BETA</span></p>
          <p class="topbar-province-hint" id="topbar-province-hint" aria-live="polite">Selecciona una provincia</p>
          <div class="topbar-search-row">
            <div class="card-search" role="search">
              <span class="card-search-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="7" cy="7" r="5"/>
                  <line x1="10.8" y1="10.8" x2="14.5" y2="14.5"/>
                </svg>
              </span>
              <input
                class="card-search-input"
                id="card-search-input"
                type="search"
                inputmode="text"
                autocomplete="off"
                autocapitalize="characters"
                spellcheck="false"
                maxlength="24"
                placeholder="Buscar por ID de carta"
                aria-label="Buscar por ID de carta"
              />
            </div>
            <button class="scanner-btn" id="scanner-btn" aria-label="Escáner de cartas" disabled hidden>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="4" width="12" height="9" rx="1"/>
                <path d="M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/>
                <circle cx="8" cy="8.5" r="2"/>
              </svg>
            </button>
          </div>
          <div class="lang-switcher" id="lang-switcher"></div>
        </header>

      <!-- Scanner overlay -->
      <div class="scanner-overlay" id="scanner-overlay" hidden aria-modal="true" role="dialog" aria-label="Escáner de cartas">
        <div class="scanner-header">
          <span class="scanner-title">Escáner de cartas</span>
          <button class="scanner-close" id="scanner-close" aria-label="Cerrar escáner">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
          </button>
        </div>
        <div class="scanner-viewport">
          <video id="scanner-video" autoplay playsinline muted></video>
          <canvas id="scanner-guide" aria-hidden="true"></canvas>
          <div id="scanner-analyzing" class="scanner-analyzing" hidden aria-live="polite">
            <img id="scanner-analyzing-img" class="scanner-analyzing-img" src="" alt="" aria-hidden="true">
            <div class="scanner-analyzing-scanline" aria-hidden="true"></div>
            <div class="scanner-analyzing-vignette" aria-hidden="true"></div>
          </div>
        </div>
        <p class="scanner-status" id="scanner-status" role="status">Encuadra el ID y pulsa el botón</p>
        <div class="scanner-footer">
          <img id="scanner-preview" class="scanner-preview" src="" alt="Captura" hidden />
          <button class="scanner-capture-btn" id="scanner-capture" aria-label="Capturar imagen">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0c0704" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="5" fill="#0c0704"/>
              <path d="M9 2h6l1.5 2H18a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1.5Z"/>
            </svg>
          </button>
          <div class="scanner-result-actions" id="scanner-result-actions" hidden>
            <button class="scanner-action-btn scanner-action-btn--ok" id="scanner-confirm-ok" type="button" hidden aria-label="Confirmar carta">
              <span class="scanner-action-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,9 6,13 14,3"/></svg>
              </span>
              <span id="scanner-action-ok-label">OK</span>
            </button>
            <button class="scanner-action-btn scanner-action-btn--retry" id="scanner-retry" type="button" hidden aria-label="Reintentar reconocimiento">
              <span class="scanner-action-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3v4H9"/><path d="M13 7a5 5 0 1 1-1.3-3.4"/></svg>
              </span>
              <span id="scanner-action-retry-label">Retry</span>
            </button>
          </div>
        </div>
      </div>

        <div class="music-bar" id="music-bar"></div>
      </div>

      <div class="app-body">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <main class="content" id="main-content" tabindex="-1">
          <section class="screen-card" id="screen" aria-label="Narraciones"></section>
        </main>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>window.__scannerBtn=document.getElementById('scanner-btn');window.__scannerOverlay=document.getElementById('scanner-overlay');</script>
  </body>
</html>
